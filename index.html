<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Calendar</title>
  <link rel="icon" type="image/webp" href="assets/favicon-32x32.webp" sizes="32x32">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- App stylesheets are split by feature. Load order matches the original
       cascade order so specificity works as before. Hrefs filled in by the
       inline boot script below with a cache-bust querystring. -->
  <link rel="stylesheet" class="app-style" data-href="styles/base.css">
  <link rel="stylesheet" class="app-style" data-href="styles/sidebar.css">
  <link rel="stylesheet" class="app-style" data-href="styles/timeline.css">
  <link rel="stylesheet" class="app-style" data-href="styles/cw-views.css">
  <link rel="stylesheet" class="app-style" data-href="styles/overlays.css">
  <script>
    // Always refetch CSS — cheap on localhost, prevents stale styles after edits.
    const v = '?v=' + Date.now();
    document.querySelectorAll('link.app-style').forEach(el => { el.href = el.dataset.href + v; });
  </script>
  <script type="module">
    // Windows has no native flag emoji glyphs; this polyfill lazy-loads a tiny
    // Twemoji flags-only webfont (~140KB) only on platforms that need it.
    import { polyfillCountryFlagEmojis } from "https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1.8/dist/index.mjs";
    polyfillCountryFlagEmojis();
  </script>
</head>
<body>

<div class="page-header">
  <div class="header-logo-wrap">
    <img src="assets/Stake_logo.svg" class="header-logo" alt="Stake" style="cursor:pointer" title="Scroll to start (Esc)">
  </div>
  <div class="header-title">
    <h1>Sports Calendar</h1>
    <div class="header-today-date" id="headerTodayDate"></div>
  </div>
  <div class="header-right">
    <div class="view-control-stack">
      <div class="view-toggle">
        <button class="view-btn on" id="btnTimeline" title="Timeline view (V to cycle)">
          <i class="fa-solid fa-table-list"></i><span class="view-btn-label">Timeline</span>
        </button>
        <button class="view-btn" id="btnCalendar" title="Calendar view (V to cycle)">
          <i class="fa-solid fa-calendar-days"></i><span class="view-btn-label">Calendar</span>
        </button>
        <button class="view-btn" id="btnWeekly" title="Weekly view (V to cycle)">
          <i class="fa-solid fa-list-ul"></i><span class="view-btn-label">Weekly</span>
        </button>
      </div>
      <button class="hide-completed-toggle" id="hideCompletedToggle" title="Hide tournaments whose end date is before today (Calendar / Weekly views only)">
        <i class="fa-regular fa-square hide-completed-icon"></i>
        <span>Hide completed events</span>
      </button>
    </div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search tournament (S)…" autocomplete="off" title="Search (S)">
      <div class="search-results" id="searchResults"></div>
    </div>
    <button class="today-btn" title="Go to today (T)">&#9654; Today</button>
    <button class="settings-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
  </div>
</div>

<div class="main" id="mainView">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <span id="sidebarLabel">Sport</span>
        <div class="sidebar-header-actions">
          <button class="filter-clear-icon-btn" id="filterClearIconBtn" title="Clear filters"><i class="fa-solid fa-xmark"></i></button>
          <button class="filter-btn" id="filterBtn" title="Filter by sport"><i class="fa-solid fa-sliders"></i></button>
          <button class="hamburger-btn" id="hamburgerBtn" title="Collapse sidebar"><i class="fa-solid fa-bars"></i></button>
        </div>
      </div>
      <div class="sort-btns">
        <button class="sort-btn"    id="btnAlpha">A–Z</button>
        <button class="sort-btn on" id="btnLive"><i class="fa-solid fa-bolt"></i> Live</button>
        <button class="sort-btn"    id="btnCountry"><i class="fa-solid fa-globe"></i> Country</button>
      </div>
    </div>
    <div class="sidebar-promo-section" id="sidebarPromoSection"></div>
    <div id="sidebarRows"></div>
  </div>
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-list" id="filterOptions"></div>
    <div class="filter-footer">
      <button class="filter-clear-btn">Clear all</button>
    </div>
  </div>
  <div class="timeline-wrapper" id="timelineWrapper">
    <div class="timeline">
      <div class="months-header" id="monthsHeader"></div>
      <div class="promo-rail" id="promoRail"></div>
      <div class="timeline-rows" id="timelineRows"></div>
    </div>
  </div>
</div>

<div class="cw-layout" id="cwLayout">
  <div class="cw-sidebar" id="cwSidebar">
    <div class="cw-sidebar-header">
      <span class="cw-sidebar-title">Filters</span>
      <span class="cw-active-badge" id="cwActiveBadge"></span>
    </div>
    <div class="cw-search-wrap">
      <i class="fa-solid fa-magnifying-glass cw-search-icon"></i>
      <input type="text" id="cwSearchInput" class="cw-search-input" placeholder="Search…" autocomplete="off">
      <button type="button" class="cw-search-clear" id="cwSearchClear" title="Clear search"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="cw-sidebar-body" id="cwSidebarBody">
      <div class="cw-section" id="cwSportSection">
        <div class="cw-section-title">Sport</div>
        <div class="cw-filter-list" id="cwSportList"></div>
      </div>
      <div class="cw-section" id="cwCountrySection">
        <div class="cw-section-title">Country</div>
        <div class="cw-filter-list" id="cwCountryList"></div>
      </div>
    </div>
    <div class="cw-sidebar-footer">
      <button class="cw-clear-btn" id="cwClearBtn" disabled>Clear filters</button>
    </div>
  </div>
  <div class="cw-main">
    <div class="calendar-view" id="calendarView"></div>
    <div class="weekly-view" id="weeklyView"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="settings-backdrop" id="settingsBackdrop"></div>
<aside class="settings-panel" id="settingsPanel" aria-hidden="true">
  <div class="settings-header">
    <span class="settings-title"><i class="fa-solid fa-gear"></i> Settings</span>
    <button class="settings-close" title="Close">&times;</button>
  </div>
  <div class="settings-content" id="settingsContent"></div>
</aside>

<div class="promo-panel-backdrop" id="promoPanelBackdrop"></div>
<aside class="promo-panel" id="promoPanel" aria-hidden="true">
  <div class="promo-panel-header">
    <span class="promo-panel-title"><i class="fa-solid fa-gift"></i> Promotions</span>
    <button class="promo-panel-close" title="Close">&times;</button>
  </div>
  <div class="promo-panel-content" id="promoPanelContent"></div>
</aside>

<div class="version-badge" id="versionBadge"></div>

<script>
(async function loadAppScripts() {
  // lookups.js is a plain global script (defines SPORT_COLORS, SPORT_ICONS,
  // getFlag, FLAGS, parseCountries, parseLinkedTournaments on window so
  // they're visible to module code too).
  // app.js is an ES module (entry point for the feature/* modules).
  const files = [
    { src: 'lookups.js', module: false },
    { src: 'app.js',     module: true  },
  ];
  const versions = {};

  async function mtime(url) {
    try {
      const r = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      const lm = r.headers.get('Last-Modified');
      return lm ? new Date(lm).getTime() : Date.now();
    } catch {
      return Date.now();
    }
  }

  function loadScript(src, isModule) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      if (isModule) s.type = 'module';
      else s.async = false; // preserve order for classic scripts
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }

  // lookups.js loads as a classic script (and thus runs before any module sees
  // SPORT_COLORS / SPORT_ICONS / getFlag, since modules implicitly defer).
  for (const f of files) {
    const ts = await mtime(f.src);
    versions[f.src] = ts;
    await loadScript(f.src + '?v=' + ts, f.module);
  }

  // Include the newest CSS mtime in the displayed version. CSS files
  // themselves use Date.now() for cache-bust above, so this is purely
  // for the badge timestamp.
  const cssFiles = ['styles/base.css', 'styles/sidebar.css', 'styles/timeline.css', 'styles/cw-views.css', 'styles/overlays.css'];
  const cssMtimes = await Promise.all(cssFiles.map(mtime));
  versions['styles'] = Math.max(...cssMtimes);

  const newest = Math.max(...Object.values(versions));
  const d = new Date(newest);
  const pad = n => String(n).padStart(2, '0');
  const badge = document.getElementById('versionBadge');
  if (badge) {
    badge.textContent =
      'v ' + d.getFullYear() + '.' + pad(d.getMonth() + 1) + '.' + pad(d.getDate()) +
      ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
})();
</script>
</body>
</html>
