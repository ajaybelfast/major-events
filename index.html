<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Major Sporting Tournaments 2026–2027</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=24">
</head>
<body>

<div class="page-header">
  <div class="header-logo-wrap">
    <img src="Stake_logo.svg" class="header-logo" alt="Stake" onclick="scrollToStart()" style="cursor:pointer">
  </div>
  <div class="header-title">
    <h1>Major Sporting Tournaments 2026–2027</h1>
    <p>Click and drag to scroll &middot; Hover over any event for details</p>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search tournament…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <button class="today-btn" onclick="scrollToToday()">&#9654; Today</button>
  </div>
</div>

<div class="main">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <span id="sidebarLabel">Sport</span>
        <div class="sidebar-header-actions">
          <button class="filter-btn" id="filterBtn" onclick="toggleFilterPanel()" title="Filter by sport"><i class="fa-solid fa-sliders"></i></button>
          <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()" title="Collapse sidebar"><i class="fa-solid fa-bars"></i></button>
        </div>
      </div>
      <div class="sort-btns">
        <button class="sort-btn"    id="btnAlpha"   onclick="setSort('alpha')">A–Z</button>
        <button class="sort-btn on" id="btnLive"    onclick="setSort('live')"><i class="fa-solid fa-bolt"></i> Live</button>
        <button class="sort-btn"    id="btnCountry" onclick="setSort('country')"><i class="fa-solid fa-globe"></i> Country</button>
      </div>
    </div>
    <div id="sidebarRows"></div>
  </div>
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-list" id="filterOptions"></div>
    <div class="filter-footer">
      <button class="filter-clear-btn" onclick="clearFilters()">Clear all</button>
    </div>
  </div>
  <div class="timeline-wrapper" id="timelineWrapper">
    <div class="timeline">
      <div class="months-header" id="monthsHeader"></div>
      <div class="timeline-rows" id="timelineRows"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="data.js?v=23"></script>
<script src="app.js?v=23"></script>
</body>
</html>
