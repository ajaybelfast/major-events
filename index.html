<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Calendar</title>
  <link rel="icon" type="image/webp" href="favicon-32x32.webp" sizes="32x32">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" id="appStyle">
  <script>
    // Always refetch CSS — cheap on localhost, prevents stale styles after edits.
    document.getElementById('appStyle').href = 'style.css?v=' + Date.now();
  </script>
  <script type="module">
    // Windows has no native flag emoji glyphs; this polyfill lazy-loads a tiny
    // Twemoji flags-only webfont (~140KB) only on platforms that need it.
    import { polyfillCountryFlagEmojis } from "https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1.8/dist/index.mjs";
    polyfillCountryFlagEmojis();
  </script>
</head>
<body>

<div class="page-header">
  <div class="header-logo-wrap">
    <img src="Stake_logo.svg" class="header-logo" alt="Stake" onclick="scrollToStart()" style="cursor:pointer" title="Scroll to start (Esc)">
  </div>
  <div class="header-title">
    <h1>Sports Calendar</h1>
    <div class="header-today-date" id="headerTodayDate"></div>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn on" id="btnTimeline" onclick="setView('timeline')" title="Timeline view (V to cycle)">
        <i class="fa-solid fa-table-list"></i><span class="view-btn-label">Timeline</span>
      </button>
      <button class="view-btn" id="btnCalendar" onclick="setView('calendar')" title="Calendar view (V to cycle)">
        <i class="fa-solid fa-calendar-days"></i><span class="view-btn-label">Calendar</span>
      </button>
      <button class="view-btn" id="btnWeekly" onclick="setView('weekly')" title="Weekly view (V to cycle)">
        <i class="fa-solid fa-list-ul"></i><span class="view-btn-label">Weekly</span>
      </button>
    </div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search tournament (S)…" autocomplete="off" title="Search (S)">
      <div class="search-results" id="searchResults"></div>
    </div>
    <button class="today-btn" onclick="goToToday()" title="Go to today (T)">&#9654; Today</button>
    <button class="settings-btn" onclick="openSettingsPanel()" title="Settings"><i class="fa-solid fa-gear"></i></button>
  </div>
</div>

<div class="main" id="mainView">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <span id="sidebarLabel">Sport</span>
        <div class="sidebar-header-actions">
          <button class="filter-clear-icon-btn" id="filterClearIconBtn" onclick="clearFilters()" title="Clear filters"><i class="fa-solid fa-xmark"></i></button>
          <button class="filter-btn" id="filterBtn" onclick="toggleFilterPanel()" title="Filter by sport"><i class="fa-solid fa-sliders"></i></button>
          <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()" title="Collapse sidebar"><i class="fa-solid fa-bars"></i></button>
        </div>
      </div>
      <div class="sort-btns">
        <button class="sort-btn"    id="btnAlpha"   onclick="setSort('alpha')">A–Z</button>
        <button class="sort-btn on" id="btnLive"    onclick="setSort('live')"><i class="fa-solid fa-bolt"></i> Live</button>
        <button class="sort-btn"    id="btnCountry" onclick="setSort('country')"><i class="fa-solid fa-globe"></i> Country</button>
      </div>
    </div>
    <div class="sidebar-promo-section" id="sidebarPromoSection"></div>
    <div id="sidebarRows"></div>
  </div>
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-list" id="filterOptions"></div>
    <div class="filter-footer">
      <button class="filter-clear-btn" onclick="clearFilters()">Clear all</button>
    </div>
  </div>
  <div class="timeline-wrapper" id="timelineWrapper">
    <div class="timeline">
      <div class="months-header" id="monthsHeader"></div>
      <div class="promo-rail" id="promoRail"></div>
      <div class="timeline-rows" id="timelineRows"></div>
    </div>
  </div>
</div>

<div class="cw-layout" id="cwLayout">
  <div class="cw-sidebar" id="cwSidebar">
    <div class="cw-sidebar-header">
      <span class="cw-sidebar-title">Filters</span>
      <span class="cw-active-badge" id="cwActiveBadge"></span>
    </div>
    <div class="cw-search-wrap">
      <i class="fa-solid fa-magnifying-glass cw-search-icon"></i>
      <input type="text" id="cwSearchInput" class="cw-search-input" placeholder="Search…" autocomplete="off" oninput="filterCwSidebar(this.value)">
      <button type="button" class="cw-search-clear" id="cwSearchClear" onclick="clearCwSearch()" title="Clear search"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="cw-sidebar-body" id="cwSidebarBody">
      <div class="cw-section" id="cwSportSection">
        <div class="cw-section-title">Sport</div>
        <div class="cw-filter-list" id="cwSportList"></div>
      </div>
      <div class="cw-section" id="cwCountrySection">
        <div class="cw-section-title">Country</div>
        <div class="cw-filter-list" id="cwCountryList"></div>
      </div>
    </div>
    <div class="cw-sidebar-footer">
      <button class="cw-clear-btn" id="cwClearBtn" onclick="clearCwFilters()" disabled>Clear filters</button>
    </div>
  </div>
  <div class="cw-main">
    <div class="calendar-view" id="calendarView"></div>
    <div class="weekly-view" id="weeklyView"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="settings-backdrop" id="settingsBackdrop" onclick="closeSettingsPanel()"></div>
<aside class="settings-panel" id="settingsPanel" aria-hidden="true">
  <div class="settings-header">
    <span class="settings-title"><i class="fa-solid fa-gear"></i> Settings</span>
    <button class="settings-close" onclick="closeSettingsPanel()" title="Close">&times;</button>
  </div>
  <div class="settings-content" id="settingsContent"></div>
</aside>

<div class="promo-panel-backdrop" id="promoPanelBackdrop" onclick="closePromoPanel()"></div>
<aside class="promo-panel" id="promoPanel" aria-hidden="true">
  <div class="promo-panel-header">
    <span class="promo-panel-title"><i class="fa-solid fa-gift"></i> Promotions</span>
    <button class="promo-panel-close" onclick="closePromoPanel()" title="Close">&times;</button>
  </div>
  <div class="promo-panel-content" id="promoPanelContent"></div>
</aside>

<div class="version-badge" id="versionBadge"></div>

<script>
(async function loadAppScripts() {
  const files = ['data.js', 'app.js'];
  const versions = {};

  async function mtime(url) {
    try {
      const r = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      const lm = r.headers.get('Last-Modified');
      return lm ? new Date(lm).getTime() : Date.now();
    } catch {
      return Date.now();
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.async = false;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }

  // data.js must load before app.js — sequential await guarantees order.
  for (const f of files) {
    const ts = await mtime(f);
    versions[f] = ts;
    await loadScript(f + '?v=' + ts);
  }

  // Include CSS mtime in the displayed version (CSS itself uses Date.now for cache-bust).
  versions['style.css'] = await mtime('style.css');

  const newest = Math.max(...Object.values(versions));
  const d = new Date(newest);
  const pad = n => String(n).padStart(2, '0');
  const badge = document.getElementById('versionBadge');
  if (badge) {
    badge.textContent =
      'v ' + d.getFullYear() + '.' + pad(d.getMonth() + 1) + '.' + pad(d.getDate()) +
      ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
})();
</script>
</body>
</html>
